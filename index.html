<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Une petite surprise... ✨</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
      color: white;
    }

    .container {
      z-index: 10;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 80%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 { font-size: 2rem; margin-bottom: 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }

    .buttons { 
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      width: 100%;
      max-width: 300px;
    }

    .btn-next { background: #00d2ff; color: white; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4); }
    .btn-next:hover { transform: scale(1.05); background: #3a7bd5; }

    #yes { background: #ff4d6d; color: white; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4); }
    #no { background: white; color: #ff4d6d; position: absolute; width: 80px; }

    .heart {
      position: absolute;
      pointer-events: none;
      animation: floatUp 4s linear forwards;
      z-index: 1;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="container" id="box">
    <h1 id="text">Est-ce que tu penses à moi parfois ? 😏</h1>
    <div class="buttons" id="btn-group">
        <button id="yes" onclick="step2()">Évidemment !</button>
        <button id="no" onmouseover="moveNo()">Non.</button>
    </div>
</div>

<script>
let yesSize = 18;

function moveNo() {
    const no = document.getElementById('no');
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    no.style.left = x + 'px';
    no.style.top = y + 'px';
    
    yesSize += 10;
    document.getElementById('yes').style.fontSize = yesSize + 'px';
}

function step2() {
    updateBox(`
        <h1>Si on devait sortir, on irait où ? 🍕</h1>
        <div class="buttons">
            <button class="btn-next" onclick="step3()">Un resto chic (je paie !)</button>
            <button class="btn-next" onclick="step3()">Netflix & Pizza 🍕</button>
            <button class="btn-next" onclick="step3()">Une balade sous les étoiles ✨</button>
        </div>
    `);
}

function step3() {
    updateBox(`
        <h1>Avoue... je suis ton/ta préféré(e) ? 😇</h1>
        <div class="buttons">
            <button class="btn-next" onclick="step4()">De loin !</button>
            <button class="btn-next" onclick="step4()">Peut-être bien...</button>
        </div>
    `);
}

function step4() {
    updateBox(`
        <h1>Dernière question : On scelle ça avec un sourire ? 😊</h1>
        <div class="buttons">
            <button id="yes" onclick="final()">OUI ! ❤️</button>
        </div>
    `);
}

function final() {
    updateBox(`
        <h1 style="font-size: 3rem;">YAY ! 🎉</h1>
        <p style="font-size: 1.5rem;">Tu viens de rendre ma journée 1000x meilleure.</p>
        <p>Prépare-toi, le meilleur est à venir ! ❤️</p>
        <button class="btn-next" onclick="location.reload()">Recommencer</button>
    `);
    // Explosion massive
    for(let i=0; i<100; i++) setTimeout(spawnHeart, i * 30);
}

function updateBox(html) {
    const box = document.getElementById('box');
    box.style.opacity = '0';
    setTimeout(() => {
        box.innerHTML = html;
        box.style.opacity = '1';
    }, 200);
}

function spawnHeart() {
    const h = document.createElement('div');
    h.className = 'heart';
    h.innerHTML = ['❤️', '💖', '✨', '🔥', '🌸'][Math.floor(Math.random()*5)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = Math.random() * 30 + 10 + 'px';
    h.style.animationDuration = Math.random() * 2 + 2 + 's';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
}

setInterval(spawnHeart, 500);
</script>

</body>
</html>
