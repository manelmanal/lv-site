<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A small question for you ✨</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
      color: white;
    }

    h1 { 
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      padding: 20px;
      z-index: 10;
    }

    .buttons { 
      margin-top: 20px; 
      z-index: 10;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    #yes { 
      background-color: #ff4d6d; 
      color: white; 
    }

    #yes:hover {
      transform: scale(1.1);
      background-color: #ff758f;
    }

    #no { 
      background-color: #ffffff; 
      color: #ff4d6d; 
      position: absolute;
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 20px;
      user-select: none;
      pointer-events: none;
      animation: float 4s linear forwards;
      z-index: 1;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .final-card {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 30px;
        border: 2px solid white;
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
        0% { transform: scale(0); }
        100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="main-container">
    <h1 id="question-text">Do you have feelings for me? 💖</h1>
    <div class="buttons" id="btn-container">
        <button id="yes" onclick="nextQuestion()">Yes</button>
        <button id="no" onmouseover="moveButton()">No</button>
    </div>
</div>

<script>
let yesSize = 18;
let currentStep = 1;

// 1. Fonction pour faire fuir le bouton "No"
function moveButton() {
    const btnNo = document.getElementById('no');
    const btnYes = document.getElementById('yes');
    
    // Calcul de positions aléatoires
    const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
    const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
    
    btnNo.style.left = x + 'px';
    btnNo.style.top = y + 'px';

    // Faire grossir le bouton "Yes" pour forcer le destin !
    yesSize += 10;
    btnYes.style.fontSize = yesSize + 'px';
    btnYes.style.padding = (yesSize/2 + 5) + 'px ' + (yesSize + 10) + 'px';
}

// 2. Gestion des étapes
function nextQuestion() {
    currentStep++;
    const container = document.getElementById('main-container');
    
    if(currentStep === 2) {
        container.innerHTML = `
            <h1>How strong are your feelings for me? 🌹</h1>
            <div class="buttons">
                <button id="yes" onclick="nextQuestion()">They are genuine and strong</button>
                <button id="yes" onclick="nextQuestion()">They grow more every day</button>
                <button id="yes" onclick="nextQuestion()">Stronger than I expected</button>
            </div>
        `;
    } else if(currentStep === 3) {
        container.innerHTML = `
            <h1>What makes you feel this way? ✨</h1>
            <div class="buttons">
                <button id="yes" onclick="nextQuestion()">Your personality and kindness</button>
                <button id="yes" onclick="nextQuestion()">The way you make me feel</button>
                <button id="yes" onclick="nextQuestion()">Everything about you</button>
            </div>
        `;
    } else if(currentStep === 4) {
        showFinal();
    }
}

// 3. Écran final (Remplacement de la vidéo)
function showFinal() {
    const container = document.getElementById('main-container');
    container.innerHTML = `
        <div class="final-card">
            <h1>That means a lot to me ❤️</h1>
            <p style="font-size: 1.5rem;">I just wanted to know how you feel...</p>
            <p style="font-size: 1.2rem; font-style: italic;">Thank you for being so honest with your heart! ✨</p>
            <button id="yes" onclick="location.reload()" style="font-size: 16px;">Recommencer</button>
        </div>
    `;
    
    // Explosion de coeurs plus intense à la fin
    for(let i=0; i<50; i++) {
        setTimeout(createHeart, i * 50);
    }
}

// 4. Animation des coeurs en arrière-plan
function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = ['❤️', '💖', '💗', '💕', '🌸'][Math.floor(Math.random() * 5)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(heart);

    setTimeout(() => { heart.remove(); }, 4000);
}

// Générer des coeurs en continu
setInterval(createHeart, 400);

</script>

</body>
</html>
