<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>A small question for you</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
    }
    h1 { color: white; }
    p { color: white; font-size: 18px; }
    .buttons { margin-top: 20px; }
    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }
    #yes { background-color: #4CAF50; color: white; }
    #no { background-color: #f44336; color: white; position: absolute; }

    .heart {
      position: absolute;
      color: red;
      font-size: 20px;
      animation: float 5s linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    iframe { margin-top: 20px; border-radius: 15px; }
  </style>
</head>
<body>

<audio id="bgMusic" loop style="display:none;">
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<h1>Do you have feelings for me? 💖</h1>

<div class="buttons">
  <button id="yes" onclick="nextQuestion()">Yes</button>
  <button id="no" onmouseover="moveButton()">No</button>
</div>

<script>

// Start music on first click (browser restriction fix)
document.addEventListener('click', () => {
  const music = document.getElementById('bgMusic');
  if (music) music.play();
}, { once: true });
let yesSize = 18;

function moveButton() {
  const button = document.getElementById('no');
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  button.style.left = x + 'px';
  button.style.top = y + 'px';

  yesSize += 5;
  document.getElementById('yes').style.fontSize = yesSize + 'px';
}

function nextQuestion() {
  document.body.innerHTML = `
    <h1>How strong are your feelings for me?</h1>
    <div class="buttons">
      <button onclick="question3()">They are genuine and strong</button>
      <button onclick="question3()">They grow more every day</button>
      <button onclick="question3()">Stronger than I expected</button>
    </div>
  `;
}

function question3() {
  document.body.innerHTML = `
    <h1>What makes you feel this way about me?</h1>
    <div class="buttons">
      <button onclick="question4()">Your personality and kindness</button>
      <button onclick="question4()">The way you make me feel</button>
      <button onclick="question4()">Everything about you</button>
    </div>
  `;
}

function question4() {
  document.body.innerHTML = `
    <h1>Do you see a future with me?</h1>
    <div class="buttons">
      <button onclick="showFinal()">Yes, clearly</button>
      <button onclick="showFinal()">I truly hope so</button>
    </div>
  `;
}

function showFinal() {
  document.body.innerHTML = `
    <h1>That means a lot to me ❤️</h1>
    <p>I just wanted to know how you feel…</p>
    <iframe width="300" height="200" src="https://www.youtube.com/embed/2Vv-BfVoq4g" frameborder="0" allowfullscreen></iframe>
  `;
}

setInterval(() => {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerText = '❤️';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
  document.body.appendChild(heart);

  setTimeout(() => { heart.remove(); }, 5000);
}, 300);
</script>

</body>
</html>
